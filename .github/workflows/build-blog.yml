name: Build Blog

on:
  push:
    branches: [main]
    paths:
      - 'blog-posts.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate blog.html
        run: node build-blog.js

      - name: Commit updated blog.html and rss.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog.html rss.xml
          git diff --cached --quiet || git commit -m "chore: regenerate blog.html and rss.xml from blog-posts.json"
          git push
